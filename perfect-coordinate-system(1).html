<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三列元素容器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            overflow: hidden;
        }

        /* CSS变量：动态高度管理系统 */
        :root {
            --top-bar-height: 60px;
            --bottom-bar-height: 80px;
            --aiff-icon-height: 33px;
            --available-height: calc(100vh - var(--top-bar-height) - var(--bottom-bar-height));
            --account-section-height: calc(var(--available-height) - var(--aiff-icon-height) - var(--tools-normal-height));
            --tools-normal-height: calc(var(--available-height) * 0.35);
            --tools-expanded-height: calc(var(--available-height) * 0.75);
            
            /* AI草稿SVG虚线阴影参数 */
            --ai-draft-dash-length: 8;
            /* AI草稿消息增强多层阴影方案变量 */
            --ai-draft-opacity: 0.85;
            --ai-draft-other-border: #999;
            --ai-draft-self-border: #333;
            
            /* 增强外阴影组合 */
            --ai-draft-outer-shadow-main: 0 0 12px rgba(0,0,0,0.25);
            --ai-draft-outer-shadow-soft: 0 2px 8px rgba(0,0,0,0.15);
            
            /* 增强内阴影组合 */
            --ai-draft-inner-shadow-deep: inset 0 0 6px rgba(0,0,0,0.4);
            --ai-draft-inner-shadow-soft: inset 0 1px 3px rgba(0,0,0,0.3);
            
            /* 多层高光效果 */
            --ai-draft-inner-highlight-main: inset 0 0 2px rgba(255,255,255,0.2);
            --ai-draft-inner-highlight-edge: inset 1px 1px 1px rgba(255,255,255,0.15);
            --ai-draft-outer-highlight: 0 0 0 1px rgba(255,255,255,0.1);
        }

        /* 应用整体容器 */
        .app-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: transparent;
        }
        
        /* 顶部栏 */
        .top-bar {
            height: var(--top-bar-height);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            flex-shrink: 0;
            z-index: 1000;
        }
        
        .main-container {
            height: var(--available-height);
            display: flex;
            background: transparent;
            overflow: hidden;
            flex-shrink: 0;
        }

        .column {
            height: 100%;
            overflow-y: auto;
            position: relative;
        }

        .session-avatars-column {
            width: 52px;
            background: transparent;
            padding: 0 7px;
        }

        .messages-column {
            flex: 1;
            background: transparent;
            position: relative;
        }

        .right-side-container {
            width: 52px;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: transparent;
            position: relative;
        }

        .account-avatars-section {
            height: var(--account-section-height);
            overflow-y: auto;
            padding: 0 7px;
            background: transparent;
            transition: height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            flex-shrink: 0;
        }

        .account-avatars-section.compressed {
            height: calc(var(--available-height) * 0.22);
        }

        .aiff-flow-icon {
            height: var(--aiff-icon-height);
            width: 52px;
            background: linear-gradient(135deg, 
                rgba(128, 128, 128, 0.12) 0%, 
                rgba(128, 128, 128, 0.08) 100%);
            backdrop-filter: blur(10px) saturate(120%);
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: space-between;
            color: #333;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 5px 0 0 5px;
            cursor: pointer;
            padding: 2px 0;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }

        .aiff-flow-icon.tools-expanded {
            background: linear-gradient(135deg, 
                rgba(79, 172, 254, 0.15) 0%, 
                rgba(0, 242, 254, 0.1) 100%);
            backdrop-filter: blur(12px) saturate(150%);
            box-shadow: 0 4px 12px rgba(79, 172, 254, 0.4);
            border-color: rgba(79, 172, 254, 0.3);
            color: #1a365d;
        }

        .aiff-first-line {
            width: 100%;
            height: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            font-weight: bold;
            line-height: 1;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3), 
                         0 0 6px rgba(255, 255, 255, 0.8),
                         1px 1px 0 rgba(255, 255, 255, 0.5);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .aiff-second-line {
            width: 100%;
            height: 15px;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }

        .aiff-scrolling-container {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            display: flex;
            align-items: center;
            white-space: nowrap;
            will-change: transform;
        }

        .aiff-scrolling-text {
            font-size: 7px;
            font-weight: 500;
            line-height: 1;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.4), 
                         0 0 4px rgba(255, 255, 255, 0.6),
                         1px 1px 0 rgba(255, 255, 255, 0.3);
            white-space: nowrap;
            display: inline-block;
            padding-right: 8px;
        }

        .aiff-scrolling-text:last-child {
            padding-right: 0;
        }

        /* 滚动动画 - 根据文本长度动态计算 */
        @keyframes scrollTextSeamless {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(-50%);
            }
        }

        .aiff-scrolling-container.scrolling {
            animation: scrollTextSeamless linear infinite;
        }

        /* 暂停滚动 */
        .aiff-flow-icon:hover .aiff-scrolling-container {
            animation-play-state: paused;
        }

        /* 增强玻璃质感效果 */
        .aiff-flow-icon::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, 
                rgba(255, 255, 255, 0.1) 0%, 
                transparent 50%, 
                rgba(255, 255, 255, 0.05) 100%);
            border-radius: 5px 0 0 5px;
            pointer-events: none;
        }
        
        /* ========== 顶部栏样式 ========== */
        
        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .top-bar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .unread-indicator {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff6b6b 0%, #ff5252 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .unread-indicator::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
            top: -2px;
            right: -2px;
            border: 2px solid #ff5252;
            animation: pulse 2s infinite;
        }
        
        .unread-indicator:hover {
            transform: scale(1.1);
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.2); }
        }

        /* CSS硬件加速动画 - 真正的高性能流光效果 */
        @keyframes dashFlow-left-to-right {
            0% { stroke-dashoffset: 0; }
            100% { stroke-dashoffset: -72; }  /* 12+60=72 */
        }
        
        @keyframes dashFlow-right-to-left {
            0% { stroke-dashoffset: 0; }
            100% { stroke-dashoffset: -60; }  /* 10+50=60 */
        }
        
        @keyframes dashFlow-right-to-right {
            0% { stroke-dashoffset: 0; }
            100% { stroke-dashoffset: -48; }  /* 8+40=48 */
        }
        
        /* 启用GPU合成层 */
        .animated-connection {
            will-change: stroke-dashoffset;
            transform: translateZ(0); /* 强制GPU合成 */
        }
        
        .chat-title {
            background: none;
            border: none;
            font-size: 16px;
            font-weight: 600;
            color: #333;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 6px;
            transition: all 0.2s ease;
            max-width: 200px;
            text-overflow: ellipsis;
            overflow: hidden;
            white-space: nowrap;
        }
        
        .chat-title:hover {
            background: rgba(0, 0, 0, 0.05);
        }
        
        .top-bar-icon {
            width: 24px;
            height: 24px;
            background: none;
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #666;
            font-size: 14px;
        }
        
        .top-bar-icon:hover {
            background: rgba(0, 0, 0, 0.1);
            transform: scale(1.1);
        }
        
        .edit-icon::before { content: '✏️'; }
        .add-user-icon::before { content: '👥'; }
        .search-icon {
            position: relative;
        }
        .search-icon::before { 
            content: '';
            display: inline-block;
            width: 18px;
            height: 18px;
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4)) drop-shadow(0 1px 4px rgba(0,0,0,0.6));
        }
        .search-icon svg {
            width: 18px;
            height: 18px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4)) drop-shadow(0 1px 4px rgba(0,0,0,0.6));
        }
        
        .current-user-name {
            font-size: 14px;
            color: #666;
            font-weight: 500;
            max-width: 120px;
            text-overflow: ellipsis;
            overflow: hidden;
            white-space: nowrap;
        }
        
        /* ========== 底部栏样式 ========== */
        
        .bottom-bar {
            height: var(--bottom-bar-height);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid #e0e0e0;
            padding: 12px 20px;
            flex-shrink: 0;
            z-index: 1000;
            position: relative;
            display: flex;
            align-items: center;
        }
        
        
        .input-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .input-container {
            flex: 1;
            max-width: 600px;
            margin: 0 auto;
        }
        
        .message-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 24px;
            font-size: 14px;
            background: #fff;
            outline: none;
            transition: all 0.2s ease;
        }
        
        .message-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .bottom-icon {
            width: 32px;
            height: 32px;
            background: none;
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #666;
            font-size: 16px;
            flex-shrink: 0;
        }
        
        .bottom-icon:hover {
            background: rgba(0, 0, 0, 0.1);
            transform: scale(1.1);
        }
        
        .voice-icon::before { content: '🎤'; }
        .home-icon::before { content: '🏠'; }
        .emoji-icon::before { content: '😊'; }
        .gift-icon::before { content: '🎁'; }
        .expand-icon::before { content: '➕'; }
        
        /* 展开菜单 */
        .expand-menu {
            position: absolute;
            bottom: 100%;
            right: 20px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            padding: 16px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            min-width: 280px;
            transform: translateY(10px) scale(0.95);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 1001;
        }
        
        .expand-menu.show {
            transform: translateY(0) scale(1);
            opacity: 1;
            visibility: visible;
        }
        
        .expand-menu-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 12px 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            color: #333;
        }
        
        .expand-menu-item:hover {
            background: rgba(102, 126, 234, 0.1);
            transform: scale(1.05);
        }
        
        .expand-menu-icon {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: white;
        }
        
        .expand-menu-label {
            font-size: 11px;
            color: #666;
            text-align: center;
        }

        .tools-column {
            height: var(--tools-normal-height);
            overflow-y: auto;
            display: flex;
            flex-direction: column-reverse;
            padding: 0 7px;
            transition: height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: transparent;
            flex-shrink: 0;
        }

        .tools-column.expanded {
            height: var(--tools-expanded-height);
        }

        .avatar-item {
            width: 38px;
            height: 38px;
            margin: 7px 0;
            border-radius: 6px;
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            position: relative;
        }

        .avatar-item.account {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }

        .avatar-item.tool {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        /* ============= 消息模板CSS规范 ============= */
        /* CSS变量定义 */
        :root {
            --message-border-radius: 6px;
            --message-padding: 7px 7px;
            --message-gap: 9px;
            --avatar-size: 37px;
            --bubble-height: 37px;
            --text-line-height: 1.2;
            --quote-bar-width: 3px;
            --quote-bar-color: rgba(255, 255, 255, 0.6);
            --glass-blur: 20px;
            --text-shadow-enhanced: 0 1px 3px rgba(0, 0, 0, 0.6), 0 0 6px rgba(0, 0, 0, 0.4), 0 0 10px rgba(0, 0, 0, 0.25), 0 1px 1px rgba(0, 0, 0, 0.5);
            --sender-name-shadow: 0 2px 6px rgba(0, 0, 0, 1), 0 0 16px rgba(255, 255, 255, 0.9), 0 0 8px rgba(0, 0, 0, 0.8), 0 1px 3px rgba(0, 0, 0, 0.8), 0 0 20px rgba(255, 255, 255, 0.6);
        }

        /* 消息基础Block */
        .message {
            width: 100%;
            margin-bottom: var(--message-gap);
            position: relative;
        }

        .message__container {
            display: flex;
            align-items: flex-start;
            gap: var(--message-gap);
            max-width: 100%;
            margin: 0 0;
        }

        .message__avatar {
            flex-shrink: 0;
            width: var(--avatar-size);
            height: var(--avatar-size);
            border-radius: var(--message-border-radius);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 500;
            font-size: 0.875rem;
            box-shadow: 0 0 4px rgba(0, 0, 0, 0.15);
        }

        .message__content {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 0;
            position: relative;
        }

        .message__bubble {
            position: relative;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(156, 163, 175, 0.4);
            border-radius: var(--message-border-radius);
            padding: var(--message-padding);
            backdrop-filter: blur(var(--glass-blur));
            transition: transform 0.2s ease;
            cursor: pointer;
            width: fit-content;
            max-width: 100%;
            min-height: var(--bubble-height);
            box-shadow: 0 0 4px rgba(0, 0, 0, 0.15);
        }

        .message__bubble:hover {
            transform: scale(1.01);
        }

        .message__text {
            color: white;
            text-shadow: var(--text-shadow-enhanced);
            word-wrap: break-word;
            line-height: var(--text-line-height);
            flex: 1;
        }

        .message__sender {
            position: absolute;
            left: 8px;
            top: 0;
            transform: translateY(-50%);
            z-index: 30;
            font-size: 0.75rem;
            color: white;
            text-shadow: var(--sender-name-shadow);
            white-space: nowrap;
        }

        .message__time {
            font-size: 0.7em;
            opacity: 0.7;
            color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
            margin-top: 4px;
        }

        .message__group-name {
            opacity: 0.8;
            margin-left: 4px;
        }

        /* 引用样式 */
        .message__quote {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            padding: 8px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
            border-left: var(--quote-bar-width) solid var(--quote-bar-color);
        }

        .message__quote-content {
            flex: 1;
        }

        .message__quote-author {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 4px;
            font-weight: 500;
        }

        .message__quote-text {
            font-size: 0.875rem;
            color: rgba(255, 255, 255, 0.9);
            opacity: 0.8;
            line-height: 1.4;
        }

        /* 发送者修饰符 - 自己的消息 */
        .message--self .message__container {
            flex-direction: row-reverse;
            margin-left: auto;
            justify-content: flex-start;
        }

        .message--self .message__content {
            align-items: flex-end;
        }

        .message--self .message__bubble {
            background: rgba(255, 255, 255, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .message--self .message__sender {
            left: auto;
            right: 8px;
        }

        /* AI草稿气泡样式 - 标准虚线边框 + 增强多层阴影高光 */
        .message--ai-draft .message__bubble {
            /* 标准虚线边框，天然支持圆角 */
            border: 3px dashed var(--ai-draft-other-border);
            border-radius: 6px;
            background: transparent;
            
            /* 增强多层阴影高光组合：6层效果叠加 */
            box-shadow: 
                /* 外阴影组 - 营造深度和存在感 */
                var(--ai-draft-outer-shadow-main),     /* 主外阴影：强烈深度 */
                var(--ai-draft-outer-shadow-soft),     /* 辅外阴影：柔和扩散 */
                var(--ai-draft-outer-highlight),       /* 外轮廓高光 */
                
                /* 内阴影组 - 增强边框对比和立体感 */
                var(--ai-draft-inner-shadow-deep),     /* 深内阴影：强对比 */
                var(--ai-draft-inner-shadow-soft),     /* 轻内阴影：边缘细节 */
                
                /* 高光组 - 创造精致感和光泽 */
                var(--ai-draft-inner-highlight-main),  /* 主内高光：整体亮度 */
                var(--ai-draft-inner-highlight-edge);  /* 边缘高光：精致细节 */
            
            opacity: var(--ai-draft-opacity);
            position: relative;
        }

        /* Self消息使用黑色虚线边框 + 重新调整阴影 */
        .message--ai-draft.message--self .message__bubble {
            border-color: var(--ai-draft-self-border);
            /* Self消息的黑色边框阴影配置：强化阴影对比，减少高光 */
            box-shadow: 
                /* 外阴影保持一致 */
                var(--ai-draft-outer-shadow-main),
                var(--ai-draft-outer-shadow-soft),
                0 0 0 1px rgba(0,0,0,0.1),                     /* 外轮廓黑色细线 */
                
                /* 强化内阴影，突出黑色边框 */
                inset 0 0 5px rgba(0,0,0,0.4),                 /* 强内阴影 */
                inset 0 1px 3px rgba(0,0,0,0.3),               /* 边缘深阴影 */
                
                /* 适度内高光，与黑色边框平衡 */
                inset 0 0 1px rgba(255,255,255,0.15),          /* 轻微内高光 */
                inset 1px 1px 1px rgba(255,255,255,0.1);       /* 边缘轻高光 */
        }

        /* AI标识 */
        .message__ai-indicator {
            position: absolute;
            top: -8px;
            right: 8px;
            background: rgba(59, 130, 246, 0.8);
            color: white;
            font-size: 0.625rem;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 500;
            backdrop-filter: blur(8px);
        }

        /* 系统消息样式 */
        .message--system .message__container {
            justify-content: center;
        }

        .message--system .message__text {
            background: rgba(0, 0, 0, 0.3);
            padding: 6px 12px;
            border-radius: var(--message-border-radius);
            font-size: 0.875rem;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        /* 引用消息样式 - 作为独立消息显示 */
        .message--quote {
            margin-bottom: 4px;
        }

        .message--quote .message__bubble {
            background: rgba(128, 128, 128, 0.2);
            border: 1px solid rgba(156, 163, 175, 0.3);
            font-size: 0.875rem;
            opacity: 0.9;

    <script>
        // 高度管理器
        class HeightManager {
            constructor() {
                this.topBarHeight = 60;
                this.bottomBarHeight = 80;
                this.aiffIconHeight = 33;
                this.isInitialized = false;
                
                this.initializeHeightSystem();
            }
            
            // 初始化高度管理系统
            initializeHeightSystem() {
                if (this.isInitialized) return;
                
                this.updateCSSVariables();
                this.setupResizeListener();
                this.isInitialized = true;
                
                console.log('HeightManager: 高度管理系统已初始化');
            }
            
            // 更新CSS变量
            updateCSSVariables() {
                const root = document.documentElement;
                
                // 计算可用高度
                const availableHeight = window.innerHeight - this.topBarHeight - this.bottomBarHeight;
                
                // 设置CSS变量
                root.style.setProperty('--top-bar-height', `${this.topBarHeight}px`);
                root.style.setProperty('--bottom-bar-height', `${this.bottomBarHeight}px`);
                root.style.setProperty('--aiff-icon-height', `${this.aiffIconHeight}px`);
                root.style.setProperty('--available-height', `${availableHeight}px`);
                
                // 计算组件高度
                const toolsNormalHeight = availableHeight * 0.35;
                const toolsExpandedHeight = availableHeight * 0.75;
                const accountSectionHeight = availableHeight - this.aiffIconHeight - toolsNormalHeight;
                
                root.style.setProperty('--tools-normal-height', `${toolsNormalHeight}px`);
                root.style.setProperty('--tools-expanded-height', `${toolsExpandedHeight}px`);
                root.style.setProperty('--account-section-height', `${accountSectionHeight}px`);
                
                console.log('HeightManager: CSS变量已更新', {
                    availableHeight,
                    accountSectionHeight,
                    toolsNormalHeight,
                    toolsExpandedHeight
                });
            }
            
            // 监听窗口大小变化
            setupResizeListener() {
                let resizeTimer;
                window.addEventListener('resize', () => {
                    clearTimeout(resizeTimer);
                    resizeTimer = setTimeout(() => {
                        this.updateCSSVariables();
                        this.triggerLayoutUpdate();
                    }, 100);
                });
            }
            
            // 触发布局更新
            triggerLayoutUpdate() {
                const event = new CustomEvent('heightManagerUpdate', {
                    detail: {
                        availableHeight: this.getAvailableHeight(),
                        accountHeight: this.getAccountHeight(),
                        toolsHeight: this.getToolsHeight()
                    }
                });
                document.dispatchEvent(event);
            }
            
            // 获取可用高度
            getAvailableHeight() {
                return window.innerHeight - this.topBarHeight - this.bottomBarHeight;
            }
            
            // 获取账号区域高度
            getAccountHeight() {
                const available = this.getAvailableHeight();
                return available - this.aiffIconHeight - (available * 0.35);
            }
            
            // 获取工具列高度
            getToolsHeight(expanded = false) {
                const available = this.getAvailableHeight();
                return expanded ? available * 0.75 : available * 0.35;
            }
            
            // 获取完整状态信息
            getState() {
                return {
                    topBarHeight: this.topBarHeight,
                    bottomBarHeight: this.bottomBarHeight,
                    aiffIconHeight: this.aiffIconHeight,
                    availableHeight: this.getAvailableHeight(),
                    accountHeight: this.getAccountHeight(),
                    toolsNormalHeight: this.getToolsHeight(false),
                    toolsExpandedHeight: this.getToolsHeight(true),
                    isInitialized: this.isInitialized
                };
            }
        }

        class BaseColumn {
            constructor(element) {
                this.element = element;
                this.items = [];
            }

            addItem(item) {
                this.items.push(item);
                this.element.appendChild(item);
            }

            clear() {
                this.element.innerHTML = '';
                this.items = [];
            }

            scrollToTop() {
                this.element.scrollTop = 0;
            }

            scrollToBottom() {
                this.element.scrollTop = this.element.scrollHeight;
            }
        }

        class AiffFlowIcon {
            constructor(element) {
                this.element = element;
                this.animationState = 'normal';
                this.isScrolling = true;
                
                // DOM 元素引用
                this.scrollingContainer = element.querySelector('#aiffScrollingContainer');
                this.scrollingText = element.querySelector('#aiffScrollingText');
                this.scrollingTextClone = element.querySelector('#aiffScrollingTextClone');
                
                // 状态管理
                this.currentStatus = '洞悉中：点我查看当前意图设计';
                this.scrollSpeed = 30; // 每秒滚动像素数
                
                // 后端配置
                this.backendConfig = {
                    endpoint: null,
                    updateInterval: 5000,
                    autoSync: false
                };
                
                // 初始化
                this.initializeScrolling();
                this.validateElements();
            }
            
            // 验证DOM元素
            validateElements() {
                if (!this.scrollingContainer || !this.scrollingText || !this.scrollingTextClone) {
                    console.warn('AiffFlowIcon: Missing required DOM elements');
                    return false;
                }
                return true;
            }

            // 初始化滚动动画
            initializeScrolling() {
                if (!this.validateElements()) return;
                
                // 计算并设置滚动动画参数
                this.updateScrollAnimation();
            }
            
            // 动态计算滚动动画duration
            updateScrollAnimation() {
                if (!this.validateElements()) return;
                
                // 测量文本宽度
                const textWidth = this.measureTextWidth(this.currentStatus);
                const containerWidth = 41; // icon宽度
                
                // 计算滚动距离和时间
                const scrollDistance = Math.max(textWidth, containerWidth);
                const duration = scrollDistance / this.scrollSpeed; // 秒
                
                // 设置CSS动画duration
                this.scrollingContainer.style.animationDuration = `${duration}s`;
            }
            
            // 测量文本宽度
            measureTextWidth(text) {
                if (!this.scrollingText) return 100;
                
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                
                // 获取当前字体样式
                const fontSize = window.getComputedStyle(this.scrollingText).fontSize;
                const fontFamily = window.getComputedStyle(this.scrollingText).fontFamily;
                const fontWeight = window.getComputedStyle(this.scrollingText).fontWeight;
                
                context.font = `${fontWeight} ${fontSize} ${fontFamily}`;
                
                return Math.ceil(context.measureText(text).width);
            }

            // 工具列状态变化响应
            onToolsColumnStateChange(eventType, source) {
                if (eventType === 'expanded' && this.animationState !== 'expanded') {
                    this.animateExpanded();
                } else if (eventType === 'collapsed' && this.animationState !== 'normal') {
                    this.animateCollapsed();
                }
            }

            animateExpanded() {
                this.element.classList.add('tools-expanded');
                this.animationState = 'expanded';
            }

            animateCollapsed() {
                this.element.classList.remove('tools-expanded');
                this.animationState = 'normal';
            }
            
            // ========== 公共API接口 ==========
            
            // 更新状态文本
            updateStatus(newStatus) {
                if (typeof newStatus !== 'string' || newStatus.trim() === '') {
                    console.warn('AiffFlowIcon: Invalid status text provided');
                    return false;
                }
                
                const trimmedStatus = newStatus.trim();
                if (trimmedStatus === this.currentStatus) {
                    return true; // 没有变化，直接返回成功
                }
                
                this.currentStatus = trimmedStatus;
                
                // 更新DOM中的文本内容
                if (this.scrollingText) {
                    this.scrollingText.textContent = this.currentStatus;
                }
                if (this.scrollingTextClone) {
                    this.scrollingTextClone.textContent = this.currentStatus;
                }
                
                // 重新计算滚动动画
                this.updateScrollAnimation();
                
                console.log(`AiffFlowIcon: Status updated to "${this.currentStatus}"`);
                return true;
            }
            
            // 获取当前状态
            getCurrentStatus() {
                return this.currentStatus;
            }
            
            // 启动滚动
            startScrolling() {
                if (!this.validateElements()) return false;
                
                this.isScrolling = true;
                this.scrollingContainer.classList.add('scrolling');
                return true;
            }
            
            // 暂停滚动
            pauseScrolling() {
                if (!this.validateElements()) return false;
                
                this.isScrolling = false;
                this.scrollingContainer.classList.remove('scrolling');
                return true;
            }
            
            // 设置滚动速度
            setScrollSpeed(pixelsPerSecond) {
                if (typeof pixelsPerSecond !== 'number' || pixelsPerSecond <= 0) {
                    console.warn('AiffFlowIcon: Invalid scroll speed');
                    return false;
                }
                
                this.scrollSpeed = pixelsPerSecond;
                this.updateScrollAnimation();
                return true;
            }
            
            // ========== 后端集成接口 ==========
            
            // 配置后端连接
            configureBackend(endpoint, options = {}) {
                this.backendConfig = {
                    endpoint: endpoint,
                    updateInterval: options.updateInterval || 5000,
                    autoSync: options.autoSync || false,
                    headers: options.headers || {},
                    timeout: options.timeout || 10000
                };
                
                if (this.backendConfig.autoSync) {
                    this.startAutoSync();
                }
                
                return true;
            }
            
            // 从后端获取状态
            async fetchStatusFromBackend() {
                if (!this.backendConfig.endpoint) {
                    // 模拟后端数据用于演示
                    return this.getMockBackendData();
                }
                
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), this.backendConfig.timeout);
                    
                    const response = await fetch(this.backendConfig.endpoint, {
                        method: 'GET',
                        headers: {
                            'Content-Type': 'application/json',
                            ...this.backendConfig.headers
                        },
                        signal: controller.signal
                    });
                    
                    clearTimeout(timeoutId);
                    
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }
                    
                    const data = await response.json();
                    return data.status || data.message || data.text;
                    
                } catch (error) {
                    console.error('AiffFlowIcon: Backend fetch failed:', error);
                    // 返回fallback状态
                    return '连接异常：请检查网络状态';
                }
            }
            
            // 模拟后端数据（用于演示）
            getMockBackendData() {
                const mockStatuses = [
                    '洞悉中：点我查看当前意图设计',
                    '分析中：正在理解用户需求',
                    '思考中：构建解决方案',
                    '执行中：生成代码实现',
                    '优化中：提升代码质量',
                    '完成：任务执行成功',
                    '待命中：等待新的指令'
                ];
                
                return new Promise((resolve) => {
                    setTimeout(() => {
                        const randomStatus = mockStatuses[Math.floor(Math.random() * mockStatuses.length)];
                        resolve(randomStatus);
                    }, Math.random() * 500 + 200); // 200-700ms延迟模拟网络
                });
            }
            
            // 启动自动同步
            startAutoSync() {
                if (this.autoSyncInterval) {
                    this.stopAutoSync();
                }
                
                this.autoSyncInterval = setInterval(async () => {
                    try {
                        const newStatus = await this.fetchStatusFromBackend();
                        this.updateStatus(newStatus);
                    } catch (error) {
                        console.error('AiffFlowIcon: Auto-sync failed:', error);
                    }
                }, this.backendConfig.updateInterval);
                
                console.log('AiffFlowIcon: Auto-sync started');
            }
            
            // 停止自动同步
            stopAutoSync() {
                if (this.autoSyncInterval) {
                    clearInterval(this.autoSyncInterval);
                    this.autoSyncInterval = null;
                    console.log('AiffFlowIcon: Auto-sync stopped');
                }
            }
            
            // 手动同步一次
            async syncOnce() {
                try {
                    const newStatus = await this.fetchStatusFromBackend();
                    return this.updateStatus(newStatus);
                } catch (error) {
                    console.error('AiffFlowIcon: Manual sync failed:', error);
                    return false;
                }
            }
            
            // ========== 生命周期管理 ==========
            
            // 销毁实例
            destroy() {
                this.stopAutoSync();
                
                // 清理DOM事件（如果有的话）
                // 这里可以添加更多清理逻辑
                
                console.log('AiffFlowIcon: Instance destroyed');
            }
            
            // 获取完整状态信息
            getFullState() {
                return {
                    currentStatus: this.currentStatus,
                    isScrolling: this.isScrolling,
                    scrollSpeed: this.scrollSpeed,
                    animationState: this.animationState,
                    backendConfig: {
                        ...this.backendConfig,
                        headers: '[hidden]' // 隐藏敏感信息
                    },
                    isAutoSyncing: !!this.autoSyncInterval
                };
            }
        }

        class ToolsColumn extends BaseColumn {

                this.observers.forEach(observer => {

        class ScrollInteractionManager {
            constructor(toolsColumn, accountColumn) {
                this.toolsColumn = toolsColumn;
                this.accountColumn = accountColumn;
                this.wheelDebounceTimer = null;
                this.setupEventListeners();
            }
            
            // 防抖函数 - 优化wheel事件触发频率
            debounce(func, delay) {
                return (...args) => {
                    clearTimeout(this.wheelDebounceTimer);
                    this.wheelDebounceTimer = setTimeout(() => func.apply(this, args), delay);
                };
            }

            setupEventListeners() {
                // 方案1：使用wheel事件检测滚动意图（解决column-reverse单向触发问题）
                const wheelExpandHandler = this.debounce(() => {
                    this.toolsColumn.expand();
                }, 100);
                
                this.toolsColumn.element.addEventListener('wheel', wheelExpandHandler);
                
                // 保持scroll事件作为备用触发机制（兼容性）
                this.toolsColumn.element.addEventListener('scroll', () => {
                    this.toolsColumn.expand();
                });

                // 账号列滚动时收起工具列（保持不变）
                this.accountColumn.element.addEventListener('scroll', () => {
                    this.toolsColumn.collapse();
                });
            }
        }

        // 状态管理器 - 集中式状态管理
        class StateManager {
            constructor() {
                this.state = {
                    app: {
                        itemCount: 0,
                        message: '系统初始化中...',
                        isInitialized: false
                    },
                    ui: {
                        controlsVisible: true,
                        expandMenuOpen: false
                    },
                    columns: {
                        scrollPositions: {},
                        itemCounts: {}
                    },
                    performance: {
                        memoryUsage: 0,
                        renderTime: 0
                    },
                    aiff: {
                        currentStatus: '洞悉中：点我查看当前意图设计',
                        isScrolling: true,
                        isAutoSync: false
                    }
                };
                
                this.listeners = new Map();
                this.stateHistory = [];
                this.maxHistorySize = 10;
            }
            
            // 订阅状态变更
            subscribe(path, callback) {
                if (!this.listeners.has(path)) {
                    this.listeners.set(path, new Set());
                }
                this.listeners.get(path).add(callback);
                
                return () => {
                    const pathListeners = this.listeners.get(path);
                    if (pathListeners) {
                        pathListeners.delete(callback);
                        if (pathListeners.size === 0) {
                            this.listeners.delete(path);
                        }
                    }
                };
            }
            
            // 获取状态
            getState(path = null) {
                if (!path) return { ...this.state };
                
                return path.split('.').reduce((obj, key) => {
                    return obj && obj[key] !== undefined ? obj[key] : undefined;
                }, this.state);
            }
            
            // 更新状态
            setState(path, value) {
                const keys = path.split('.');
                const lastKey = keys.pop();
                const target = keys.reduce((obj, key) => {
                    if (!obj[key]) obj[key] = {};
                    return obj[key];
                }, this.state);
                
                const oldValue = target[lastKey];
                target[lastKey] = value;
                
                // 记录历史
                this.addToHistory(path, oldValue, value);
                
                // 通知订阅者
                this.notifyListeners(path, value, oldValue);
                
                console.log(`StateManager: ${path} 更新为`, value);
            }
            
            // 批量更新状态
            batchUpdate(updates) {
                Object.entries(updates).forEach(([path, value]) => {
                    this.setState(path, value);
                });
            }
            
            // 通知监听者
            notifyListeners(path, newValue, oldValue) {
                // 通知精确路径的监听者
                const pathListeners = this.listeners.get(path);
                if (pathListeners) {
                    pathListeners.forEach(callback => {
                        try {
                            callback(newValue, oldValue, path);
                        } catch (error) {
                            console.error('StateManager: 监听者回调错误', error);
                        }
                    });
                }
                
                // 通知父路径的监听者
                const pathParts = path.split('.');
                for (let i = pathParts.length - 1; i > 0; i--) {
                    const parentPath = pathParts.slice(0, i).join('.');
                    const parentListeners = this.listeners.get(parentPath);
                    if (parentListeners) {
                        const parentState = this.getState(parentPath);
                        parentListeners.forEach(callback => {
                            try {
                                callback(parentState, null, parentPath);
                            } catch (error) {
                                console.error('StateManager: 父路径监听者回调错误', error);
                            }
                        });
                    }
                }
            }
            
            // 添加到历史记录
            addToHistory(path, oldValue, newValue) {
                this.stateHistory.push({
                    timestamp: Date.now(),
                    path,
                    oldValue,
                    newValue
                });
                
                if (this.stateHistory.length > this.maxHistorySize) {
                    this.stateHistory.shift();
                }
            }
            
            // 获取状态历史
            getHistory() {
                return [...this.stateHistory];
            }
            
            // 重置状态
            reset() {
                const oldState = { ...this.state };
                this.state = {
                    app: {
                        itemCount: 0,
                        message: '状态已重置',
                        isInitialized: false
                    },
                    ui: {
                        controlsVisible: true,
                        expandMenuOpen: false
                    },
                    columns: {
                        scrollPositions: {},
                        itemCounts: {}
                    },
                    performance: {
                        memoryUsage: 0,
                        renderTime: 0
                    },
                    aiff: {
                        currentStatus: '洞悉中：点我查看当前意图设计',
                        isScrolling: true,
                        isAutoSync: false
                    }
                };
                
                // 通知所有监听者状态重置
                this.listeners.forEach((listeners, path) => {
                    const newValue = this.getState(path);
                    const oldValue = path.split('.').reduce((obj, key) => {
                        return obj && obj[key] !== undefined ? obj[key] : undefined;
                    }, oldState);
                    
                    listeners.forEach(callback => {
                        try {
                            callback(newValue, oldValue, path);
                        } catch (error) {
                            console.error('StateManager: 重置通知错误', error);
                        }
                    });
                });
                
                console.log('StateManager: 状态已重置');
            }
        }

        // 列管理器 - 专职列组件管理
        class ColumnManager {

                    this.columns.set('messages', new BaseColumn(document.getElementById('messagesColumn')));

                    });

                } catch (error) {
                    console.error('ColumnManager: 列组件初始化失败', error);
                    throw error;
                }
            }
            
            // 创建右侧容器
            createRightSideContainer() {
                const containerElement = document.getElementById('rightSideContainer');
                if (!containerElement) {
                    throw new Error('ColumnManager: 右侧容器元素未找到');
                }
                
                const accountSection = new BaseColumn(document.getElementById('accountAvatars'));
                const aiffIcon = new AiffFlowIcon(document.getElementById('aiffFlowIcon'));
                const toolsColumn = new ToolsColumn(document.getElementById('toolsColumn'));
                
                // 订阅Aiff状态变更
                this.stateManager.subscribe('aiff.currentStatus', (newStatus) => {
                    if (aiffIcon && typeof aiffIcon.updateStatus === 'function') {
                        aiffIcon.updateStatus(newStatus);
                    }
                });
                
                return new RightSideContainer(containerElement, accountSection, aiffIcon, toolsColumn);
            }
            
            // 设置滚动交互
            setupScrollInteraction() {
                const rightSide = this.columns.get('rightSide');
                if (rightSide) {
                    this.scrollManager = new ScrollInteractionManager(
                        rightSide.toolsColumn,
                        rightSide.accountSection
                    );
                }
            }
            
            // 获取指定列
            getColumn(columnName) {
                return this.columns.get(columnName);
            }
            
            // 添加项目到列
            addItemToColumn(columnName, item) {
                const column = this.columns.get(columnName);
                if (column && typeof column.addItem === 'function') {
                    column.addItem(item);
                    
                    // 更新状态中的项目数量
                    const currentCounts = this.stateManager.getState('columns.itemCounts') || {};
                    currentCounts[columnName] = (currentCounts[columnName] || 0) + 1;
                    this.stateManager.setState('columns.itemCounts', currentCounts);
                    
                    return true;
                }
                return false;
            }
            
            // 清空所有列
            clearAllColumns() {
                this.columns.forEach((column, name) => {
                    if (typeof column.clear === 'function') {
                        column.clear();
                    } else if (column.accountSection && column.toolsColumn) {
                        // 处理右侧容器
                        if (typeof column.accountSection.clear === 'function') {
                            column.accountSection.clear();
                        }
                        if (typeof column.toolsColumn.clear === 'function') {
                            column.toolsColumn.clear();
                        }
                    }
                });
                
                // 重置状态
                this.stateManager.setState('columns.itemCounts', {
                    session: 0,
                    messages: 0,
                    account: 0,
                    tools: 0
                });
                
                this.stateManager.setState('columns.scrollPositions', {});
                
                console.log('ColumnManager: 所有列已清空');
            }
            
            // 滚动到顶部
            scrollAllToTop() {
                const scrollPositions = {};
                
                this.columns.forEach((column, name) => {
                    if (typeof column.scrollToTop === 'function') {
                        column.scrollToTop();
                        scrollPositions[name] = 0;
                    } else if (column.accountSection && column.toolsColumn) {
                        // 处理右侧容器
                        if (typeof column.accountSection.scrollToTop === 'function') {
                            column.accountSection.scrollToTop();
                            scrollPositions['account'] = 0;
                        }
                        if (typeof column.toolsColumn.scrollToTop === 'function') {
                            column.toolsColumn.scrollToTop();
                            scrollPositions['tools'] = 0;
                        }
                    }
                });
                
                this.stateManager.setState('columns.scrollPositions', scrollPositions);
                console.log('ColumnManager: 所有列已滚动到顶部');
            }
            
            // 滚动到底部
            scrollAllToBottom() {
                const scrollPositions = {};
                
                this.columns.forEach((column, name) => {
                    if (typeof column.scrollToBottom === 'function') {
                        column.scrollToBottom();
                        scrollPositions[name] = 'bottom';
                    } else if (column.accountSection && column.toolsColumn) {
                        // 处理右侧容器
                        if (typeof column.accountSection.scrollToBottom === 'function') {
                            column.accountSection.scrollToBottom();
                            scrollPositions['account'] = 'bottom';
                        }
                        if (typeof column.toolsColumn.scrollToBottom === 'function') {
                            column.toolsColumn.scrollToBottom();
                            scrollPositions['tools'] = 'bottom';
                        }
                    }
                });
                
                this.stateManager.setState('columns.scrollPositions', scrollPositions);
                console.log('ColumnManager: 所有列已滚动到底部');
            }
            
            // 获取列状态
            getColumnStatus() {
                const status = {
                    totalColumns: this.columns.size,
                    itemCounts: this.stateManager.getState('columns.itemCounts'),
                    scrollPositions: this.stateManager.getState('columns.scrollPositions'),
                    hasScrollManager: !!this.scrollManager
                };

            // 销毁列管理器

                this.columns.clear();
                this.scrollManager = null;
                console.log('ColumnManager: 已销毁');

        }

        // 数据管理器 - 专职数据生成和业务逻辑
        class DataManager {
            constructor(stateManager, columnManager) {
                this.stateManager = stateManager;
                this.columnManager = columnManager;
                this.dataTemplates = this.initializeDataTemplates();
            }
            
            // 初始化数据模板
            initializeDataTemplates() {
                return {
                    session: {
                        prefix: 'S',
                        type: 'session',
                        gradient: 'linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)'
                    },
                    account: {
                        prefix: 'A',
                        type: 'account', 
                        gradient: 'linear-gradient(135deg, #fa709a 0%, #fee140 100%)'
                    },
                    tool: {
                        prefix: 'T',
                        type: 'tool',
                        gradient: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)'
                    },
                    message: {
                        own: {
                            gradient: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
                            color: 'white'
                        },
                        other: {
                            background: '#e9ecef',
                            color: 'black'
                        }
                    }
                };
            }
            
            // 生成测试数据
            async generateTestData(count) {
                const startTime = performance.now();
                
                try {
                    // 更新状态：开始生成
                    this.stateManager.batchUpdate({
                        'app.message': `正在生成 ${count} 个项目...`,
                        'app.itemCount': 0
                    });
                    
                    // 清空现有数据
                    this.columnManager.clearAllColumns();
                    
                    // 批量生成数据
                    const batchSize = 50;
                    for (let i = 0; i < count; i += batchSize) {
                        const currentBatch = Math.min(batchSize, count - i);
                        await this.generateBatch(i, currentBatch);
                        
                        // 更新进度
                        const progress = Math.min(i + currentBatch, count);
                        this.stateManager.setState('app.itemCount', progress);
                        
                        // 让出控制权，避免阻塞UI
                        if (i + batchSize < count) {
                            await new Promise(resolve => setTimeout(resolve, 0));
                        }
                    }
                    
                    const generateTime = Math.round(performance.now() - startTime);
                    
                    // 更新最终状态
                    this.stateManager.batchUpdate({
                        'app.itemCount': count,
                        'app.message': `生成完成，耗时 ${generateTime}ms`,
                        'performance.renderTime': generateTime
                    });
                    
                    console.log(`DataManager: 生成了 ${count} 个项目，耗时 ${generateTime}ms`);
                    return true;
                    
                } catch (error) {
                    console.error('DataManager: 数据生成失败', error);
                    this.stateManager.setState('app.message', `数据生成失败: ${error.message}`);
                    return false;
                }
            }
            
            // 生成批次数据
            async generateBatch(startIndex, batchSize) {
                for (let i = 0; i < batchSize; i++) {
                    const index = startIndex + i;
                    
                    // 生成会话头像
                    const sessionAvatar = this.createAvatarItem(`S${index + 1}`, 'session');
                    this.columnManager.addItemToColumn('session', sessionAvatar);
                    
                    // 生成消息气泡
                    const messageItem = this.createMessageItem(index);
                    this.columnManager.addItemToColumn('messages', messageItem);
                    
                    // 生成账号头像 
                    const accountAvatar = this.createAvatarItem(`A${index + 1}`, 'account');
                    const rightSideContainer = this.columnManager.getColumn('rightSide');
                    if (rightSideContainer && rightSideContainer.accountSection) {
                        rightSideContainer.accountSection.addItem(accountAvatar);
                    }
                    
                    // 生成工具图标
                    const toolItem = this.createAvatarItem(`T${index + 1}`, 'tool');
                    if (rightSideContainer && rightSideContainer.toolsColumn) {
                        rightSideContainer.toolsColumn.addItem(toolItem);
                    }
                }
            }
            
            // 创建头像项目
            createAvatarItem(text, type) {
                const avatar = document.createElement('div');
                avatar.className = `avatar-item ${type}`;
                avatar.textContent = text;
                
                // 应用样式模板
                const template = this.dataTemplates[type];
                if (template && template.gradient) {
                    avatar.style.background = template.gradient;
                }
                
                return avatar;
            }
            
            // 创建消息项目 - 使用新的消息模板规范
            createMessageItem(index) {
                const messageTypes = ['type1', 'type3', 'type5', 'type6', 'type8', 'type9', 'system'];
                const messageType = messageTypes[index % messageTypes.length];
                const isOwn = index % 2 === 0;
                
                // 根据类型创建不同的消息
                switch (messageType) {
                    case 'type1':
                        return this.createType1Message(index, isOwn);
                    case 'type3':
                        return this.createType3Message(index, isOwn);
                    case 'type5':
                        return this.createType5Message(index, isOwn);
                    case 'type6':
                        return this.createType6Message(index, isOwn);
                    case 'type8':
                        return this.createType8Message(index, isOwn);
                    case 'type9':
                        return this.createType9Message(index, isOwn);
                    case 'system':
                        return this.createSystemMessage(index);
                    default:
                        return this.createType1Message(index, isOwn);
                }
            }
            
            // 类型1: 有头像含名消息
            createType1Message(index, isOwn) {
                const messageItem = document.createElement('div');
                messageItem.className = `message message--type1 ${isOwn ? 'message--self' : 'message--other'}`;
                
                const senderName = isOwn ? '张小明' : this.getRandomSenderName(index);
                const avatarLetter = senderName.charAt(0);
                const avatarGradient = isOwn ? 
                    'linear-gradient(135deg, #667eea 0%, #764ba2 100%)' : 
                    this.getRandomGradient(index);
                
                messageItem.innerHTML = `
                    <div class="message__container">
                        <div class="message__avatar" style="background: ${avatarGradient}">
                            <span>${avatarLetter}</span>
                        </div>
                        <div class="message__content">
                            <div class="relative">
                                <div class="message__sender">${senderName}</div>
                                <div class="message__bubble">
                                    <div class="message__text">
                                        ${isOwn ? 
                                            `这是我发送的第 ${index + 1} 条消息` : 
                                            `这是收到的第 ${index + 1} 条消息`}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                
                return messageItem;
            }
            
            // 类型3: 无头像含名消息
            createType3Message(index, isOwn) {

                ];

            generateTimeString(index) {
                const baseHour = 9;
                const baseMinute = 0;
                
                const totalMinutes = baseMinute + index * 2;
                const hour = baseHour + Math.floor(totalMinutes / 60);
                const minute = totalMinutes % 60;
                
                return `${hour.toString().padStart(2, '0')}:${minute.toString().padStart(2, '0')}`;
