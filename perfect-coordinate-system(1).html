                        'columns.itemCounts': {
                            session: 0,
                            messages: 0,
                            account: 0,
                            tools: 0
                        }
                    });
                    
                    console.log('DataManager: 所有数据已清空');
                    return true;
                } catch (error) {
                    console.error('DataManager: 清空数据失败', error);
                    return false;
                }
            }
            
            // 获取数据统计
            getDataStatistics() {
                const itemCounts = this.stateManager.getState('columns.itemCounts') || {};
                const totalItems = Object.values(itemCounts).reduce((sum, count) => sum + count, 0);
                
                return {
                    totalItems,
                    itemCounts,
                    averageItemsPerColumn: totalItems / Object.keys(itemCounts).length,
                    largestColumn: Object.entries(itemCounts).reduce((max, [name, count]) => 
                        count > max.count ? {name, count} : max, {name: '', count: 0}),
                    generationTime: this.stateManager.getState('performance.renderTime') || 0
                };
            }
            
            // 导出数据
            exportData() {
                const statistics = this.getDataStatistics();
                const stateSnapshot = this.stateManager.getState();
                
                return {
                    timestamp: Date.now(),
                    statistics,
                    state: stateSnapshot,
                    version: '1.0.0'
                };
            }
            
            // 验证数据完整性
            validateDataIntegrity() {
                const issues = [];
                const itemCounts = this.stateManager.getState('columns.itemCounts') || {};
                
                // 检查列是否存在
                ['session', 'messages', 'account', 'tools'].forEach(columnName => {
                    const column = this.columnManager.getColumn(columnName);
                    if (!column && columnName !== 'account' && columnName !== 'tools') {
                        issues.push(`列 ${columnName} 不存在`);
                    }
                });
                
                // 检查项目数量一致性
                Object.entries(itemCounts).forEach(([columnName, count]) => {
                    if (typeof count !== 'number' || count < 0) {
                        issues.push(`列 ${columnName} 的项目数量无效: ${count}`);
                    }
                });
                
                return {
                    isValid: issues.length === 0,
                    issues,
                    checkedAt: new Date().toISOString()
                };
            }
        }

        // UI管理器 - 专职界面状态管理
        class UIManager {
            constructor(stateManager, heightManager) {
                this.stateManager = stateManager;
                this.heightManager = heightManager;
                this.statusInfoElement = document.getElementById('statusInfo');
                
                this.initializeUISubscriptions();
                this.updateInitialStatus();
            }
            
            // 初始化UI订阅
            initializeUISubscriptions() {
                // 订阅应用状态变更
                this.stateManager.subscribe('app', (appState) => {
                    this.updateStatusDisplay(appState);
                });
                
                // 订阅性能状态变更  
                this.stateManager.subscribe('performance', (perfState) => {
                    this.updatePerformanceDisplay(perfState);
                });
                
                // 订阅Aiff状态变更
                this.stateManager.subscribe('aiff', (aiffState) => {
                    this.updateAiffDisplay(aiffState);
                });
                
                // 订阅列状态变更
                this.stateManager.subscribe('columns', (columnsState) => {
                    this.updateColumnsDisplay(columnsState);
                });
                
                console.log('UIManager: UI订阅已初始化');
            }
            
            // 更新初始状态显示
            updateInitialStatus() {
                this.stateManager.setState('app.message', '系统已初始化');
                this.updateMemoryInfo();
            }
            
            // 更新状态显示
            updateStatusDisplay(appState) {
                if (!this.statusInfoElement) {
                    console.warn('UIManager: 状态显示元素未找到');
                    return;
                }
                
                const timestamp = new Date().toLocaleTimeString();
                const memoryInfo = this.getMemoryInfo();
                const heightInfo = this.getHeightInfo();
                const aiffState = this.stateManager.getState('aiff');
                
                this.statusInfoElement.innerHTML = `
                    ${appState.itemCount !== undefined ? `项目数量: ${appState.itemCount}<br>` : ''}
                    ${memoryInfo}
                    ${heightInfo}
                    状态: ${appState.message || '未知'}<br>
                    Aiff状态: ${aiffState?.currentStatus || '未初始化'}<br>
                    时间: ${timestamp}
                `;
            }
            
            // 更新性能显示
            updatePerformanceDisplay(perfState) {
                if (perfState.renderTime !== undefined) {
                    this.stateManager.setState('performance.memoryUsage', this.getCurrentMemoryUsage());
                }
            }
            
            // 更新Aiff显示
            updateAiffDisplay(aiffState) {
                // Aiff状态变更时的UI响应
                console.log('UIManager: Aiff状态更新为', aiffState.currentStatus);
            }
            
            // 更新列显示
            updateColumnsDisplay(columnsState) {
                const totalItems = Object.values(columnsState.itemCounts || {})
                    .reduce((sum, count) => sum + (typeof count === 'number' ? count : 0), 0);
                
                if (totalItems > 0) {
                    this.stateManager.setState('app.itemCount', totalItems);
                }
            }
            
            // 获取内存信息
            getMemoryInfo() {
                if (!performance.memory) {
                    return '';
                }
                
                const memoryMB = Math.round(performance.memory.usedJSHeapSize / 1024 / 1024);
                this.stateManager.setState('performance.memoryUsage', memoryMB);
                
                return `内存: ${memoryMB}MB<br>`;
            }
            
            // 获取当前内存使用
            getCurrentMemoryUsage() {
                if (!performance.memory) {
                    return 0;
                }
                
                return Math.round(performance.memory.usedJSHeapSize / 1024 / 1024);
            }
            
            // 获取高度信息
            getHeightInfo() {
                if (!this.heightManager) {
                    return '';
                }
                
                const heightState = this.heightManager.getState();
                return `
                    可用高度: ${heightState.availableHeight}px<br>
                    Aiff高度: ${heightState.aiffIconHeight}px<br>
                    账号区高度: ${Math.round(heightState.accountHeight)}px<br>
                    工具列高度: ${Math.round(heightState.toolsNormalHeight)}px<br>
                `;
            }
            
            // 更新内存信息
            updateMemoryInfo() {
                if (performance.memory) {
                    const memoryMB = this.getCurrentMemoryUsage();
                    this.stateManager.setState('performance.memoryUsage', memoryMB);
                }
            }
            
            // 显示错误信息
            showError(error, context = '') {
                const errorMessage = `错误${context ? ` [${context}]` : ''}: ${error.message || error}`;
                this.stateManager.setState('app.message', errorMessage);
                
                console.error('UIManager: 错误显示', errorMessage, error);
            }
            
            // 显示成功信息
            showSuccess(message, duration = 3000) {
                this.stateManager.setState('app.message', message);
                
                if (duration > 0) {
                    setTimeout(() => {
                        const currentMessage = this.stateManager.getState('app.message');
                        if (currentMessage === message) {
                            this.stateManager.setState('app.message', '准备就绪');
                        }
                    }, duration);
                }
            }
            
            // 显示进度信息
            showProgress(current, total, operation = '处理') {
                const percentage = Math.round((current / total) * 100);
                const message = `${operation}中... ${current}/${total} (${percentage}%)`;
                this.stateManager.setState('app.message', message);
            }
            
            // 格式化数字显示
            formatNumber(num, decimals = 0) {
                if (typeof num !== 'number') return num;
                
                if (num >= 1000000) {
                    return (num / 1000000).toFixed(decimals) + 'M';
                } else if (num >= 1000) {
                    return (num / 1000).toFixed(decimals) + 'K';
                } else {
                    return num.toFixed(decimals);
                }
            }
            
            // 格式化时间显示
            formatDuration(ms) {
                if (ms < 1000) {
                    return `${ms}ms`;
                } else if (ms < 60000) {
                    return `${(ms / 1000).toFixed(1)}s`;
                } else {
                    const minutes = Math.floor(ms / 60000);
                    const seconds = Math.round((ms % 60000) / 1000);
                    return `${minutes}m ${seconds}s`;
                }
            }
            
            // 获取完整UI状态
            getUIState() {
                return {
                    isStatusElementAvailable: !!this.statusInfoElement,
                    subscribedPaths: Array.from(this.stateManager.listeners?.keys() || []),
                    currentMemoryUsage: this.getCurrentMemoryUsage(),
                    lastUpdated: new Date().toISOString()
                };
            }
            
            // 强制刷新所有UI
            refreshAllUI() {
                const appState = this.stateManager.getState('app');
                const perfState = this.stateManager.getState('performance'); 
                const aiffState = this.stateManager.getState('aiff');
                const columnsState = this.stateManager.getState('columns');
                
                this.updateStatusDisplay(appState);
                this.updatePerformanceDisplay(perfState);
                this.updateAiffDisplay(aiffState);
                this.updateColumnsDisplay(columnsState);
                
                console.log('UIManager: 所有UI已刷新');
            }
            
            // 销毁UI管理器
            destroy() {
                // 清理订阅（如果StateManager提供unsubscribe方法的话）
                this.statusInfoElement = null;
                console.log('UIManager: 已销毁');
            }
        }

        // 应用控制器 - 协调各个管理器的主控制器
        class ApplicationController {
            constructor() {
                this.isInitialized = false;
                this.managers = {};
                
                try {
                    // 按依赖顺序初始化管理器
                    this.initializeManagers();
                    this.setupGlobalErrorHandler();
                    this.init();
                    
                    this.isInitialized = true;
                    console.log('ApplicationController: 应用已成功初始化');
                } catch (error) {
                    console.error('ApplicationController: 初始化失败', error);
                    this.handleInitializationError(error);
                }
            }
            
            // 初始化所有管理器
            initializeManagers() {
                // 1. 状态管理器 - 最基础的服务
                this.managers.stateManager = new StateManager();
                
                // 2. 高度管理器 - 独立的布局管理
                this.managers.heightManager = new HeightManager();
                
                // 3. 列管理器 - 依赖状态管理器
                this.managers.columnManager = new ColumnManager(this.managers.stateManager);
                
                // 4. 数据管理器 - 依赖状态和列管理器
                this.managers.dataManager = new DataManager(
                    this.managers.stateManager, 
                    this.managers.columnManager
                );
                
                // 5. UI管理器 - 依赖状态和高度管理器
                this.managers.uiManager = new UIManager(
                    this.managers.stateManager,
                    this.managers.heightManager
                );
                
                // 设置管理器间的通信
                this.setupManagerCommunication();
            }
            
            // 设置管理器间通信
            setupManagerCommunication() {
                // 高度管理器事件转发到状态管理器
                document.addEventListener('heightManagerUpdate', (event) => {
                    const { detail } = event;
                    this.managers.stateManager.batchUpdate({
                        'ui.layoutUpdated': true,
                        'performance.lastLayoutUpdate': Date.now()
                    });
                    
                    console.log('ApplicationController: 高度更新事件已处理', detail);
                });
                
                // Aiff状态同步
                const rightSideContainer = this.managers.columnManager.getColumn('rightSide');
                if (rightSideContainer && rightSideContainer.aiffIcon) {
                    this.managers.stateManager.subscribe('aiff.currentStatus', (newStatus) => {
                        try {
                            rightSideContainer.aiffIcon.updateStatus(newStatus);
                        } catch (error) {
                            console.error('ApplicationController: Aiff状态更新失败', error);
                        }
                    });
                }
            }
            
            // 设置全局错误处理
            setupGlobalErrorHandler() {
                window.addEventListener('error', (event) => {
                    this.handleGlobalError(event.error, 'Global Error');
                });
                
                window.addEventListener('unhandledrejection', (event) => {
                    this.handleGlobalError(event.reason, 'Unhandled Promise Rejection');
                });
            }
            
            // 初始化默认数据
            async init() {
                try {
                    this.managers.stateManager.setState('app.message', '正在初始化默认数据...');
                    
                    // 异步生成默认数据
                    await this.managers.dataManager.generateTestData(50);
                    
                    this.managers.stateManager.batchUpdate({
                        'app.message': '应用已就绪',
                        'app.isInitialized': true
                    });
                    
                } catch (error) {
                    console.error('ApplicationController: 默认数据初始化失败', error);
                    this.managers.uiManager.showError(error, '初始化');
                }
            }
            
            // ========== 公共API接口 ==========
            
            // 生成测试数据
            async generateItems(count) {
                if (!this.managers.dataManager) {
                    throw new Error('数据管理器未初始化');
                }
                
                return await this.managers.dataManager.generateTestData(count);
            }
            
            // 清空所有数据
            clearAll() {
                if (!this.managers.dataManager) {
                    throw new Error('数据管理器未初始化');
                }
                
                return this.managers.dataManager.clearAllData();
            }
            
            // 滚动到顶部
            scrollToTop() {
                if (!this.managers.columnManager) {
                    throw new Error('列管理器未初始化');
                }
                
                this.managers.columnManager.scrollAllToTop();
            }
            
            // 滚动到底部
            scrollToBottom() {
                if (!this.managers.columnManager) {
                    throw new Error('列管理器未初始化');
                }
                
                this.managers.columnManager.scrollAllToBottom();
            }
            
            // 更新Aiff状态
            updateAiffStatus(status) {
                if (!this.managers.stateManager) {
                    throw new Error('状态管理器未初始化');
                }
                
                this.managers.stateManager.setState('aiff.currentStatus', status);
                return true;
            }
            
            // 获取应用状态
            getApplicationState() {
                if (!this.managers.stateManager) {
                    return null;
                }
                
                return {
                    isInitialized: this.isInitialized,
                    state: this.managers.stateManager.getState(),
                    managers: Object.keys(this.managers),
                    columnStatus: this.managers.columnManager?.getColumnStatus(),
                    dataStatistics: this.managers.dataManager?.getDataStatistics(),
                    uiState: this.managers.uiManager?.getUIState(),
                    heightState: this.managers.heightManager?.getState()
                };
            }
            
            // 重置应用
            async resetApplication() {
                try {
                    this.managers.uiManager.showProgress(0, 4, '重置');
                    
                    // 1. 清空数据
                    this.managers.dataManager.clearAllData();
                    this.managers.uiManager.showProgress(1, 4, '重置');
                    
                    // 2. 重置状态
                    this.managers.stateManager.reset();
                    this.managers.uiManager.showProgress(2, 4, '重置');
                    
                    // 3. 刷新UI
                    this.managers.uiManager.refreshAllUI();
                    this.managers.uiManager.showProgress(3, 4, '重置');
                    
                    // 4. 重新初始化
                    await this.init();
                    this.managers.uiManager.showProgress(4, 4, '重置');
                    
                    this.managers.uiManager.showSuccess('应用已重置');
                    return true;
                    
                } catch (error) {
                    console.error('ApplicationController: 应用重置失败', error);
                    this.managers.uiManager.showError(error, '重置');
                    return false;
                }
            }
            
            // 导出应用数据
            exportApplicationData() {
                const appState = this.getApplicationState();
                const exportData = {
                    timestamp: Date.now(),
                    version: '2.0.0-refactored',
                    applicationState: appState,
                    dataStatistics: this.managers.dataManager?.getDataStatistics(),
                    stateHistory: this.managers.stateManager?.getHistory()
                };
                
                return exportData;
            }
            
            // 验证应用完整性
            validateApplication() {
                const issues = [];
                
                // 检查管理器状态
                ['stateManager', 'heightManager', 'columnManager', 'dataManager', 'uiManager'].forEach(managerName => {
                    if (!this.managers[managerName]) {
                        issues.push(`${managerName} 未初始化`);
                    }
                });
                
                // 检查数据完整性
                if (this.managers.dataManager) {
                    const dataValidation = this.managers.dataManager.validateDataIntegrity();
                    if (!dataValidation.isValid) {
                        issues.push(...dataValidation.issues);
                    }
                }
                
                return {
                    isValid: issues.length === 0,
                    issues,
                    checkedAt: new Date().toISOString(),
                    applicationVersion: '2.0.0-refactored'
                };
            }
            
            // ========== 错误处理 ==========
            
            // 处理初始化错误
            handleInitializationError(error) {
                console.error('ApplicationController: 严重初始化错误', error);
                
                // 尝试显示错误信息
                const statusElement = document.getElementById('statusInfo');
                if (statusElement) {
                    statusElement.innerHTML = `
                        <span style="color: red;">
                            应用初始化失败<br>
                            错误: ${error.message}<br>
                            时间: ${new Date().toLocaleTimeString()}
                        </span>
                    `;
                }
            }
            
            // 处理全局错误
            handleGlobalError(error, context) {
                console.error(`ApplicationController: ${context}`, error);
                
                if (this.managers.stateManager && this.managers.uiManager) {
                    this.managers.uiManager.showError(error, context);
                }
            }
            
            // 销毁应用
            destroy() {
                try {
                    // 销毁所有管理器
                    Object.keys(this.managers).forEach(managerName => {
                        const manager = this.managers[managerName];
                        if (manager && typeof manager.destroy === 'function') {
                            manager.destroy();
                        }
                    });
                    
                    this.managers = {};
                    this.isInitialized = false;
                    
                    console.log('ApplicationController: 应用已销毁');
                } catch (error) {
                    console.error('ApplicationController: 销毁过程中出现错误', error);
                }
            }
        }

            insertText(text) {

                const currentValue = input.value;
                const cursorPosition = input.selectionStart;
                
                const newValue = currentValue.slice(0, cursorPosition) + text + currentValue.slice(cursorPosition);

                input.focus();
                input.setSelectionRange(cursorPosition + text.length, cursorPosition + text.length);
            }

        // ========== 高性能实时连接线系统 ==========
        
        // 1. 高性能几何计算引擎
        class HighPerformanceGeometryEngine {
            constructor() {
                // 预计算常量表 - 避免运行时数学计算
                this.CONSTANTS = {
                    RADIUS: 2,
                    PRECISION: 100, // 坐标精度优化
                    // 三种连接类型的预计算延伸距离
                    EXTEND_DISTANCES: {
                        'left-to-right': 12,   // 左侧消息到右侧头像/工具
                        'right-to-left': 18,   // 右侧消息到左侧头像
                        'right-to-right': 10   // 右侧消息到右侧工具（短距离）
                    },
                    // 中轴线偏移预计算表 - 修正为内侧偏移
                    CENTER_OFFSETS: {
                        'left-to-right': 12,    // AI消息向右偏移，中轴线在消息右侧
                        'right-to-left': -12,   // 用户消息向左偏移，中轴线在消息左侧  
                        'right-to-right': -10   // 右到右连接向左偏移
                    }
                };
                
                // TypedArray坐标缓存，提升计算性能
                this.coordsBuffer = new Float32Array(16); // 8个点 × 2坐标
            }
            
            // 向量化坐标计算 - 批量处理提升性能
            calculateOptimizedPath(startX, startY, endX, endY, type, connectionId = 0) {
                const { RADIUS, EXTEND_DISTANCES, CENTER_OFFSETS } = this.CONSTANTS;
                
                // 获取预计算常量
                const extend = EXTEND_DISTANCES[type];
                const baseOffset = CENTER_OFFSETS[type];
                
                // 连接线ID偏移算法 - 解决同侧重叠问题
                const idOffset = this.calculateConnectionIdOffset(connectionId, type);
                const centerX = startX + baseOffset + idOffset;
                
                // 方向向量化计算
                const verticalDir = endY > startY ? 1 : -1;
                const horizontalDir = endX > centerX ? 1 : -1;
                
                // 批量计算所有关键点坐标
                const coords = this.coordsBuffer;
                
                // 起点
                coords[0] = this.optimizePrecision(startX);
                coords[1] = this.optimizePrecision(startY);
                
                // 水平延伸点
                coords[2] = this.optimizePrecision(startX + (type === 'left-to-right' ? -3 : 3));
                coords[3] = this.optimizePrecision(startY);
                
                // 第一转折控制点
                coords[4] = this.optimizePrecision(centerX);
                coords[5] = this.optimizePrecision(startY);
                
                // 第一转折结束点
                coords[6] = this.optimizePrecision(centerX);
                coords[7] = this.optimizePrecision(startY + (verticalDir * RADIUS));
                
                // 垂直段终点 (关键: 动态计算避免重叠)
                coords[8] = this.optimizePrecision(centerX);
                coords[9] = this.optimizePrecision(endY - (verticalDir * RADIUS));
                
                // 第二转折控制点
                coords[10] = this.optimizePrecision(centerX);
                coords[11] = this.optimizePrecision(endY);
                
                // 第二转折结束点
                coords[12] = this.optimizePrecision(centerX + (horizontalDir * RADIUS));
                coords[13] = this.optimizePrecision(endY);
                
                // 终点
                coords[14] = this.optimizePrecision(endX);
                coords[15] = this.optimizePrecision(endY);
                
                return this.generateSVGPath(coords);
            }
            
            // 连接线ID偏移计算 - 解决同侧重叠的核心算法
            calculateConnectionIdOffset(connectionId, type) {
                // 紧密错开算法：每个ID产生不同的偏移
                const baseSpacing = 8; // 基础间距
                const offsetMultiplier = (connectionId % 5) - 2; // -2, -1, 0, 1, 2 的循环
                
                // 根据连接类型调整偏移方向
                let directionFactor = 1;
                if (type === 'right-to-left') {
                    directionFactor = -1; // 反向偏移
                }
                
                return offsetMultiplier * baseSpacing * directionFactor;
            }
            
            // 坐标精度优化 - 减少SVG数据量
            optimizePrecision(value) {
                return Math.round(value * this.CONSTANTS.PRECISION) / this.CONSTANTS.PRECISION;
            }
            
            // 生成优化的SVG路径字符串
            generateSVGPath(coords) {
                return `M ${coords[0]} ${coords[1]} L ${coords[2]} ${coords[3]} Q ${coords[4]} ${coords[5]} ${coords[6]} ${coords[7]} L ${coords[8]} ${coords[9]} Q ${coords[10]} ${coords[11]} ${coords[12]} ${coords[13]} L ${coords[14]} ${coords[15]}`;
            }
            
            // 调试点生成 - 便于可视化调试
            generateDebugPoints(coords, type, connectionId) {
                return {
                    start: { x: coords[0], y: coords[1], label: `起点-${connectionId}`, color: '#ff4444' },
                    extend: { x: coords[2], y: coords[3], label: '水平延伸', color: '#ff8800' },
                    turn1Control: { x: coords[4], y: coords[5], label: '转折1控制', color: '#ffaa00' },
                    turn1End: { x: coords[6], y: coords[7], label: '转折1终点', color: '#88ff44' },
                    verticalEnd: { x: coords[8], y: coords[9], label: `垂直段-${connectionId}`, color: '#4488ff' },
                    turn2Control: { x: coords[10], y: coords[11], label: 'L形控制点', color: '#8844ff' },
                    turn2End: { x: coords[12], y: coords[13], label: '水平延伸起点', color: '#ff44aa' },
                    end: { x: coords[14], y: coords[15], label: `终点-${connectionId}`, color: '#ff00aa' }
                };
            }
        }

        // 2. 连接线ID分配系统 - 解决同侧重叠问题
        class ConnectionIdManager {
            constructor() {
                this.connectionCounts = {
                    'left-to-right': 0,
                    'right-to-left': 0,
                    'right-to-right': 0
                };
                this.activeConnections = new Map();
                this.colorPalettes = this.initializeColorPalettes();
            }
            
            // 初始化多色光线调色板
            initializeColorPalettes() {
                return {
                    'left-to-right': [
                        '#00ff88', '#00ddaa', '#00bbcc', '#0099ee', '#0077ff'
                    ],
                    'right-to-left': [
                        '#ff6b35', '#ff8844', '#ffaa33', '#ffcc22', '#ffdd11'
                    ],
                    'right-to-right': [
                        '#9c27b0', '#aa44cc', '#bb66dd', '#cc88ee', '#dd99ff'
                    ]
                };
            }
            
            // 分配连接线ID和颜色
            assignConnection(startElement, endElement, type) {
                const connectionKey = `${startElement.id}-${endElement.id}-${type}`;
                
                if (this.activeConnections.has(connectionKey)) {
                    return this.activeConnections.get(connectionKey);
                }
                
                const connectionId = this.connectionCounts[type]++;
                const colorIndex = connectionId % this.colorPalettes[type].length;
                const color = this.colorPalettes[type][colorIndex];
                
                const connectionInfo = {
                    id: connectionId,
                    key: connectionKey,
                    type: type,
                    color: color,
                    startElement: startElement,
                    endElement: endElement,
                    timestamp: performance.now()
                };
                
                this.activeConnections.set(connectionKey, connectionInfo);
                return connectionInfo;
            }
            
            // 清理过期连接
            cleanupExpiredConnections() {
                const currentTime = performance.now();
                const expiryTime = 30000; // 30秒过期
                
                for (const [key, connection] of this.activeConnections) {
                    if (currentTime - connection.timestamp > expiryTime) {
                        this.activeConnections.delete(key);
                    }
                }
            }
            
            // 重置连接计数器
            reset() {
                this.connectionCounts = {
                    'left-to-right': 0,
                    'right-to-left': 0,
                    'right-to-right': 0
                };
                this.activeConnections.clear();
            }
            
            // 获取统计信息
            getStats() {
                return {
                    totalConnections: this.activeConnections.size,
                    countByType: { ...this.connectionCounts },
                    activeConnections: Array.from(this.activeConnections.keys())
                };
            }
        }

        // 3. LRU缓存系统 - 避免重复计算
        class LRUPathCache {
            constructor(maxSize = 500) {
                this.maxSize = maxSize;
                this.cache = new Map();
                this.hitCount = 0;
                this.missCount = 0;
            }
            
            // 生成缓存键
            generateCacheKey(startX, startY, endX, endY, type, connectionId) {
                const precision = 5; // 粗精度减少缓存项
                return `${Math.round(startX/precision)*precision}_${Math.round(startY/precision)*precision}_${Math.round(endX/precision)*precision}_${Math.round(endY/precision)*precision}_${type}_${connectionId}`;
            }
            
            // 获取缓存
            get(startX, startY, endX, endY, type, connectionId) {
                const key = this.generateCacheKey(startX, startY, endX, endY, type, connectionId);
                
                if (this.cache.has(key)) {
                    // LRU机制：移到最末尾
                    const value = this.cache.get(key);
                    this.cache.delete(key);
                    this.cache.set(key, value);
                    this.hitCount++;
                    return value;
                }
                
                this.missCount++;
                return null;
            }
            
            // 设置缓存
            set(startX, startY, endX, endY, type, connectionId, value) {
                const key = this.generateCacheKey(startX, startY, endX, endY, type, connectionId);
                
                // LRU淘汰：删除最旧项
                if (this.cache.size >= this.maxSize) {
                    const firstKey = this.cache.keys().next().value;
                    this.cache.delete(firstKey);
                }
                
                this.cache.set(key, value);
            }
            
            // 获取缓存命中率
            getHitRate() {
                const total = this.hitCount + this.missCount;
                return total > 0 ? (this.hitCount / total * 100).toFixed(1) : '0.0';
            }
            
            // 清理缓存
            clear() {
                this.cache.clear();
                this.hitCount = 0;
                this.missCount = 0;
            }
        }

        // 4. 对象池系统 - 减少GC压力
        class ObjectPool {
            constructor(createFn, resetFn, initialSize = 30) {
                this.createFn = createFn;
                this.resetFn = resetFn;
                this.pool = [];
                this.activeObjects = new Set();
                
                // 预创建对象池
                for (let i = 0; i < initialSize; i++) {
                    this.pool.push(this.createFn());
                }
            }
            
            // 获取对象
            acquire() {
                let obj = this.pool.pop();
                if (!obj) {
                    obj = this.createFn();
                }
                this.activeObjects.add(obj);
                return obj;
            }
            
            // 释放对象
            release(obj) {
                if (this.activeObjects.has(obj)) {
                    this.activeObjects.delete(obj);
                    this.resetFn(obj);
                    
                    if (this.pool.length < 60) { // 限制池大小
                        this.pool.push(obj);
                    }
                }
            }
            
            // 获取使用率统计
            getUsageStats() {
                const total = this.pool.length + this.activeObjects.size;
                return {
                    pooled: this.pool.length,
                    active: this.activeObjects.size,
                    total: total,
                    utilization: total > 0 ? (this.activeObjects.size / total * 100).toFixed(1) : '0.0'
                };
            }
        }

        // 5. SVG渲染管理器 - 批量DOM操作优化
        class SVGRenderManager {
            constructor(containerId = 'main-container') {
                // 重新设计：使用body作为绝对坐标基准，避免容器冲突
                this.containerElement = document.body;
                this.targetContainer = document.querySelector('.main-container') || document.querySelector('.app-container');
